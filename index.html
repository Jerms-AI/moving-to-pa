<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Moving to PA — School-District Quality Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --ink: #1f2421;
    --muted: #5f6c5d;
    --paper: #f6f4ef;
    --accent: #c2410c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--paper);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 12px 20px; border-bottom: 1px solid #e2ddd2; background: #fffdf9;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    position: relative; z-index: 1100;
  }
  header .title h1 {
    font-family: "Fraunces", Georgia, serif; font-weight: 600;
    font-size: 20px; margin: 0; letter-spacing: -0.01em;
  }
  header .title .sub { color: var(--muted); font-size: 12.5px; }
  .toggle { display: flex; gap: 0; margin-left: auto; border: 1px solid #d8d2c5; border-radius: 8px; overflow: hidden; }
  .toggle button {
    font: inherit; font-size: 13px; font-weight: 500; border: none; cursor: pointer;
    padding: 7px 14px; background: #fffdf9; color: var(--muted); border-left: 1px solid #e2ddd2;
  }
  .toggle button:first-child { border-left: none; }
  .toggle button.active { background: var(--accent); color: #fff; }
  .toggle .band-grades { font-size: 11px; opacity: .8; display: block; font-weight: 400; }
  .search-ctrl { display: flex; }
  .search-ctrl input { font: inherit; font-size: 13px; padding: 7px 10px; width: 230px;
    border: 1px solid #d8d2c5; border-radius: 8px 0 0 8px; background: #fffdf9; color: var(--ink); }
  .search-ctrl input::placeholder { color: #9aa39a; }
  .search-ctrl button { font: inherit; font-size: 13px; padding: 7px 12px; cursor: pointer;
    border: 1px solid var(--accent); border-left: none; border-radius: 0 8px 8px 0; background: var(--accent); color: #fff; }
  .demo-ctrl { display: flex; align-items: center; gap: 6px; margin-left: 14px; font-size: 12px; color: var(--muted); }
  .demo-ctrl select { font: inherit; font-size: 13px; padding: 5px 8px; border: 1px solid #d8d2c5; border-radius: 8px; background: #fffdf9; color: var(--ink); cursor: pointer; }
  .ideal-btn { margin-left: 10px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    padding: 7px 14px; border: 1px solid #d8b24a; border-radius: 8px; background: #fffdf3; color: #92670b; }
  .ideal-btn.active { background: #92670b; color: #fff; border-color: #92670b; }
  .filters-wrap { position: relative; }
  .filters-btn { display: flex; align-items: center; gap: 6px; font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; padding: 7px 12px; border: 1px solid #d8d2c5; border-radius: 8px; background: #fffdf9; color: var(--muted); }
  .filters-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filters-btn.open { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filters-btn svg { width: 14px; height: 14px; flex: none; }
  .filters-panel { position: absolute; top: calc(100% + 8px); right: 0; z-index: 1200; width: 232px;
    background: #fffdf9; border: 1px solid #e2ddd2; border-radius: 10px; box-shadow: 0 6px 22px rgba(0,0,0,.18); padding: 12px 13px; }
  .fp-group + .fp-group { margin-top: 12px; padding-top: 12px; border-top: 1px solid #efe9dd; }
  .fp-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
  .fp-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-chip { display: inline-flex; align-items: center; gap: 5px; font: inherit; font-size: 12.5px; font-weight: 500;
    cursor: pointer; padding: 5px 10px; border: 1px solid #d8d2c5; border-radius: 7px; background: #fff; color: var(--muted); }
  .filter-chip:hover { border-color: #b9b2a3; }
  .filter-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .filter-chip .cdot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,.55); flex: none; }
  #main { flex: 1; display: flex; min-height: 0; position: relative; }
  #sidebar { width: 340px; flex: none; overflow-y: auto; background: #efece5; border-right: 1px solid #e2ddd2; padding-bottom: 44px; transition: width .18s ease; }
  #rightbar { width: 230px; flex: none; overflow-y: auto; background: #efece5; border-left: 1px solid #e2ddd2; padding-bottom: 20px; transition: width .18s ease; }
  #main.l-collapsed #sidebar { width: 0; border-right: none; }
  #main.r-collapsed #rightbar { width: 0; border-left: none; }
  .col-toggle { position: absolute; top: 8px; z-index: 600; width: 20px; height: 34px;
    display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer;
    border: 1px solid #d8d2c5; background: #fffdf9; color: var(--muted); border-radius: 6px;
    box-shadow: 0 1px 3px rgba(0,0,0,.15); transition: left .18s ease, right .18s ease; }
  #toggleLeft { left: 314px; }
  #main.l-collapsed #toggleLeft { left: 6px; }
  #toggleRight { right: 204px; }
  #main.r-collapsed #toggleRight { right: 6px; }
  #map { flex: 1; min-width: 0; }

  .dcard { margin: 7px 8px; background: #fff; border: 1px solid #e2ddd2; border-radius: 8px;
    padding: 7px 9px; cursor: pointer; display: flex; align-items: center; gap: 9px;
    transition: box-shadow .12s, border-color .12s; }
  .dcard.hl { box-shadow: 0 3px 12px rgba(0,0,0,.16); border-color: var(--accent); }
  .dcard-score { flex: none; width: 30px; height: 30px; border-radius: 7px; color: #fff;
    font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .dcard-body { min-width: 0; flex: 1; }
  .dcard.top { border-color: #b8860b; box-shadow: 0 0 0 2px #f3d27a inset; background: #fffdf3; }
  .dcard.selected { border-color: #2563eb; box-shadow: 0 0 0 2px #93c5fd inset; background: #f3f8ff; }
  .dcard-rank { flex: none; align-self: flex-start; font-size: 11px; font-weight: 700; color: #92670b;
    background: #f6e6b8; border-radius: 6px; padding: 2px 6px; }
  .dcard-name { font-size: 12.5px; font-weight: 600; color: var(--ink); line-height: 1.15; }
  .dcard-emh { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .dcard-demo { font-size: 10.5px; color: #6b7280; margin-top: 3px; line-height: 1.3; }
  .dcard-demo .bpct { font-weight: 800; font-size: 12.5px; color: #0f1420; }

  .side-head { padding: 10px 14px; font-size: 12px; color: var(--muted); font-weight: 600;
    position: sticky; top: 0; background: #efece5; border-bottom: 1px solid #e2ddd2; z-index: 1; }
  .sort-ctrl { display: flex; align-items: center; gap: 7px; }
  .sort-ctrl select { font: inherit; font-size: 12.5px; font-weight: 500; padding: 4px 8px;
    border: 1px solid #d8d2c5; border-radius: 7px; background: #fffdf9; color: var(--ink); cursor: pointer; flex: 1; }
  .group-head { padding: 11px 12px 4px; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted); }
  .src-seg { display: flex; margin-top: 8px; border: 1px solid #d8d2c5; border-radius: 7px; overflow: hidden; }
  .src-seg button { flex: 1; font: inherit; font-size: 12px; font-weight: 500; border: none; cursor: pointer;
    padding: 6px 6px; background: #fffdf9; color: var(--muted); border-left: 1px solid #e2ddd2; }
  .src-seg button:first-child { border-left: none; }
  .src-seg button.active { background: var(--accent); color: #fff; }
  /* "Seen" = has a note → dim it; hover restores full clarity. */
  .lcard.lcard-seen { opacity: .58; filter: grayscale(.35); }
  .lcard.lcard-seen:hover { opacity: 1; filter: none; }
  .add-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .add-row input { flex: 1; min-width: 0; font: inherit; font-size: 12.5px; padding: 6px 9px;
    border: 1px solid #d8d2c5; border-radius: 7px; background: #fffdf9; color: var(--ink); }
  .add-row input::placeholder { color: #9aa39a; }
  .add-row button { font: inherit; font-size: 12.5px; font-weight: 600; padding: 6px 13px; cursor: pointer;
    border: 1px solid var(--accent); border-radius: 7px; background: var(--accent); color: #fff; }
  .add-row button:disabled { opacity: .6; cursor: default; }
  .add-status { padding: 7px 14px; font-size: 12px; color: var(--ink); background: #eef1e9; border-bottom: 1px solid #e2ddd2; }
  .add-status.err { background: #fbecea; color: #9a2b1c; }
  .lcard.lcard-added { box-shadow: inset 4px 0 0 #4f46e5; border-color: #c7c2f0; }
  .lcard.lcard-added.hl { box-shadow: inset 4px 0 0 #4f46e5, 0 5px 16px rgba(0,0,0,.18); }
  .added-tag { font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 16px; color: #4f46e5; }
  .lcard-remove { margin-top: 8px; font: inherit; font-size: 11px; padding: 3px 9px; cursor: pointer;
    border: 1px solid #e3b3b3; border-radius: 6px; background: #fff; color: #b91c1c; }
  .lcard-remove:hover { background: #fdecec; }
  .fav-badge { display: inline-block; font-size: 10.5px; font-weight: 700; color: #be123c;
    background: #ffe4e6; border: 1px solid #fecdd3; border-radius: 20px; padding: 2px 8px; margin-bottom: 5px; }
  .lcard { margin: 10px; background: #fff; border: 1px solid #e2ddd2; border-radius: 10px;
    overflow: hidden; cursor: pointer; transition: box-shadow .12s, transform .12s, border-color .12s; }
  .lcard.hl { box-shadow: 0 5px 16px rgba(0,0,0,.18); transform: translateY(-1px); border-color: var(--accent); }
  .lcard img { width: 100%; height: 120px; object-fit: cover; display: block; background: #e8e3da; }
  .lcard-body { padding: 8px 10px 10px; }
  .lcard-price { font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 18px; line-height: 1.1; }
  .lcard-price span { font-size: 12px; color: var(--muted); font-weight: 400; }
  .lcard-stats { font-size: 12px; color: #444; margin-top: 3px; }
  .lcard-addr { font-size: 12.5px; color: var(--ink); margin-top: 3px; font-weight: 500; }
  .lcard-dist { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .lcard-link { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--accent); font-weight: 600; text-decoration: none; }
  .lcard-link:hover { text-decoration: underline; }
  .lcard-meta { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #d8d2c5; }
  .lcard-rate { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .lcard-rate .star { cursor: pointer; font-size: 17px; line-height: 1; color: #cfc9bd; transition: color .1s; }
  .lcard-rate .star:hover, .lcard-rate .star.on { color: #e0a106; }
  .lcard-note { width: 100%; box-sizing: border-box; font: inherit; font-size: 12px; resize: vertical;
    min-height: 32px; border: 1px solid #d8d2c5; border-radius: 6px; padding: 5px 7px; background: #fffdf9; color: var(--ink); }
  .lcard-note::placeholder { color: #aaa39a; }
  .lcard.rated { border-color: #e0a106; box-shadow: 0 0 0 1px #f0d486; }

  .lst-pill { color: #fff; font: 600 11px/1 Inter, sans-serif; padding: 3px 6px; border-radius: 6px;
    border: 1.5px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.5); white-space: nowrap; transition: transform .1s; }
  .lst-pill--hl { transform: scale(1.6); box-shadow: 0 0 0 2px #1C1E26, 0 3px 9px rgba(0,0,0,.6); }
  .lst-pill--approx { border-style: dashed; opacity: .8; }

  .legend {
    background: #fffdf9; border: 1px solid #e2ddd2; border-radius: 8px;
    padding: 10px 12px; font-size: 12px; line-height: 1.5; box-shadow: 0 1px 4px rgba(0,0,0,.12);
  }
  .legend h4 { margin: 0 0 6px; font-size: 12px; font-weight: 600; }
  .legend--main h4 { cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 0; }
  .legend--main:not(.collapsed) h4 { margin-bottom: 6px; }
  .legend--main.collapsed .legend-body { display: none; }
  .legend-caret { font-size: 10px; color: var(--muted); }
  .legend .row { display: flex; align-items: center; gap: 7px; }
  .legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,.25); }
  .legend .note { margin-top: 6px; color: var(--muted); max-width: 190px; }

  .score-label {
    background: transparent; border: none; box-shadow: none;
    font-weight: 700; font-size: 14px; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.6), 0 0 3px rgba(0,0,0,.5);
    text-align: center;
  }
  .leaflet-popup-content { font-size: 13px; line-height: 1.45; }
  .leaflet-popup-content h3 { margin: 0 0 2px; font-size: 15px; }
  .pop-score { display:inline-block; color:#fff; font-weight:700; border-radius:6px; padding:1px 8px; font-size:13px; }
  .pop-band { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-left:6px; }
  .pop-meta { color: var(--muted); margin: 4px 0; }
  .pop-trend { color: var(--accent); font-size: 12px; margin-top: 4px; }
  .pop-rank { font-size: 12px; margin-top: 4px; color: #374151; }
  .pop-config { color: var(--muted); font-size: 11.5px; margin-top: 4px; font-style: italic; }
  .anchor-label { background: transparent; border: none; box-shadow: none; font-weight: 600; font-size: 12px; color: #1e293b; text-shadow: 0 1px 2px #fff, 0 0 3px #fff; }

  /* Mobile: drop the map and side panels — just the scrollable list of house cards. */
  @media (max-width: 760px) {
    body { display: block; height: auto; min-height: 100vh; }
    header { position: sticky; top: 0; padding: 10px 16px; gap: 10px; }
    .search-ctrl, #toggle, .demo-ctrl, .filters-wrap, .ideal-btn { display: none !important; }
    #map, #rightbar, #toggleLeft, #toggleRight { display: none !important; }
    #main { display: block; min-height: 0; }
    #sidebar { width: 100%; overflow: visible; border-right: none; padding-bottom: 24px; }
    .side-head { position: static; }
  }
</style>
</head>
<body>
<header>
  <div class="title">
    <h1>Moving to PA</h1>
  </div>
  <form class="search-ctrl" id="searchCtrl" autocomplete="off">
    <input id="searchInput" type="text" placeholder="Search a town or address…" aria-label="Search a town or address" />
    <button type="submit">Go</button>
  </form>
  <div class="toggle" id="toggle">
    <button data-band="elementary" class="active">Elementary<span class="band-grades">K–5</span></button>
    <button data-band="middle" class="active">Middle<span class="band-grades">6–8</span></button>
    <button data-band="high">High School<span class="band-grades">9–12</span></button>
    <button data-band="k8" class="active">K–8<span class="band-grades">one school</span></button>
  </div>
  <div class="demo-ctrl">
    <label for="demoSelect">Overlay</label>
    <select id="demoSelect">
      <option value="">None</option>
      <optgroup label="Demographics (by tract)">
        <option value="white">% White</option>
        <option value="black">% Black</option>
        <option value="asian">% Asian</option>
        <option value="hispanic">% Hispanic</option>
      </optgroup>
      <optgroup label="Safety (by county)">
        <option value="crime">Violent crime rate</option>
      </optgroup>
    </select>
  </div>
  <div class="filters-wrap">
    <button id="filtersBtn" class="filters-btn" aria-expanded="false" aria-controls="filtersPanel" title="Show / hide map layers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      Filters
    </button>
    <div id="filtersPanel" class="filters-panel" hidden>
      <div class="fp-group">
        <div class="fp-label">Show on map</div>
        <div class="fp-chips">
          <button class="filter-chip active" data-layer="listings">Listings</button>
          <button class="filter-chip active" data-layer="basketball">Basketball</button>
        </div>
      </div>
      <div class="fp-group">
        <div class="fp-label">School dots · PA score</div>
        <div class="fp-chips">
          <button class="filter-chip active" data-band="10"><span class="cdot" style="background:#15803d"></span>10</button>
          <button class="filter-chip active" data-band="9"><span class="cdot" style="background:#16a34a"></span>9</button>
          <button class="filter-chip active" data-band="8"><span class="cdot" style="background:#65a30d"></span>8</button>
          <button class="filter-chip active" data-band="7"><span class="cdot" style="background:#ca8a04"></span>7</button>
          <button class="filter-chip active" data-band="6"><span class="cdot" style="background:#d97706"></span>6</button>
        </div>
      </div>
    </div>
  </div>
  <button id="idealBtn" class="ideal-btn">★ Ideal</button>
</header>
<div id="main">
  <aside id="sidebar"></aside>
  <button id="toggleLeft" class="col-toggle" title="Hide/show listings panel" aria-label="Toggle listings panel">◀</button>
  <div id="map"></div>
  <button id="toggleRight" class="col-toggle" title="Hide/show districts panel" aria-label="Toggle districts panel">▶</button>
  <aside id="rightbar"></aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── EDIT HERE ─────────────────────────────────────────────────────────────
// District scores load from districts_scores.json (computed from PA state
// proficiency for every district in the region). Edit that file to change scores.
let DISTRICTS = {};

// Point markers (single locations, not areas). Coordinates approximate.
const POINTS = [
  { kind:"work", lat:40.2415, lng:-75.2838, label:"Lansdale", popup:"<h3>Lansdale</h3><div class='pop-meta'>Wife's workplace — an anchor for the search.</div>" },
  { kind:"work", lat:40.2086, lng:-75.3128, label:"Merck (West Point)", popup:"<h3>Merck — West Point campus</h3><div class='pop-meta'>770 Sumneytown Pike, West Point, PA (Upper Gwynedd). Work location, ~5 min southwest of Lansdale.</div>" },
  { kind:"hoops", lat:40.2725, lng:-75.2810, label:"CAL Sports", popup:"<h3>CAL Sports Academy</h3><div class='pop-meta'>Basketball training + AAU travel teams (5th–10th grade), Lansdale. Strongest fit for the 6th grader. Spring tryouts Jan–Feb.</div>" },
  { kind:"hoops", lat:40.2418, lng:-75.2730, label:"North Penn YMCA", popup:"<h3>North Penn YMCA</h3><div class='pop-meta'>Year-round instructional + rec basketball leagues, Lansdale.</div>" }
];
// ──────────────────────────────────────────────────────────────────────────

const BAND_LABEL = { elementary:"Elementary", middle:"Middle", high:"High School" };
const BAND_KEYS = ["elementary", "middle", "high"];
const sel = new Set(["elementary", "middle", "k8"]);   // multi-select; default covers the kids' bands (+ combined K-8)
const fmt = n => Number.isInteger(n) ? String(n) : n.toFixed(1);
function selScore(geoid) {
  const d = DISTRICTS[geoid];
  const v = BAND_KEYS.filter(b => sel.has(b)).map(b => d[b] && d[b].score).filter(x => x != null);
  return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null;
}

function colorFor(score) {
  if (score >= 8.5) return "#15803d"; // deep green
  if (score >= 8.0) return "#4d9221"; // green
  if (score >= 7.0) return "#a3a30a"; // yellow-green
  if (score >= 6.0) return "#ca8a04"; // amber
  if (score >= 4.0) return "#d97706"; // orange
  return "#b91c1c";                   // red
}

function popupHtml(geoid) {
  const d = DISTRICTS[geoid];
  const s = selScore(geoid);
  const bands = BAND_KEYS.filter(b => sel.has(b));
  const head = s == null
    ? `<span class="pop-score" style="background:#94a3b8">—</span><span class="pop-band">select a grade band ↑</span>`
    : `<span class="pop-score" style="background:${colorFor(s)}">${fmt(s)} / 10</span><span class="pop-band">${bands.map(b => BAND_LABEL[b]).join(" + ")} · PA</span>`;
  const lines = bands.map(b => {
    const o = d[b];
    if (!o || o.score == null) return `<div class="pop-rank"><b>${BAND_LABEL[b]}:</b> n/a</div>`;
    return `<div class="pop-rank"><b>${BAND_LABEL[b]} ${o.score}/10</b>${o.rank ? ` — ${o.rank}` : ""}</div>`;
  }).join("");
  return `<h3>${d.name}</h3>${head}
    ${d.districtRank ? `<div class="pop-meta">${d.districtRank}</div>` : ""}
    ${lines}
    <div class="pop-config">${d.drive ? `Drive to Lansdale: ${d.drive} · ` : ""}${d.config || ""}</div>
    ${d.trend ? `<div class="pop-trend">${d.trend}</div>` : ""}`;
}

const map = L.map("map", { zoomControl:false }).setView([40.22, -75.30], 11);
L.control.zoom({ position:"bottomright" }).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · © <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19
}).addTo(map);

const entries = []; // { geoid, layer, label }
let districtGeo = null;   // kept for point-in-polygon district lookup of added listings

Promise.all([
  fetch("districts_scores.json").then(r => r.json()),
  fetch("districts.geojson").then(r => r.json())
]).then(([scores, geo]) => {
  DISTRICTS = scores;
  districtGeo = geo;
  scoresReady = true;
  if (typeof maybeBuildSidebar === "function") maybeBuildSidebar();
  buildPerDistrict();
  const layer = L.geoJSON(geo, {
    style: f => styleFor(f.properties.GEOID),
    onEachFeature: (f, lyr) => {
      const geoid = f.properties.GEOID;
      if (!DISTRICTS[geoid]) return;
      lyr.bindPopup(popupHtml(geoid), { maxWidth:280 });
      lyr.on("mouseover", () => lyr.setStyle({ weight:3, fillOpacity:0.7 }));
      lyr.on("mouseout",  () => lyr.setStyle(styleFor(geoid)));
      lyr.on("click",     () => highlightDistrictCard(geoid));
      const center = lyr.getBounds().getCenter();
      const label = L.marker(center, { interactive:false, icon: labelFor(geoid) }).addTo(map);
      entries.push({ geoid, layer:lyr, label });
    }
  }).addTo(map);
  map.fitBounds(layer.getBounds(), { padding:[30,30] });
  buildDistrictCards();
});

// District gating: a district stays colored only if it contains at least one school
// whose score band is currently toggled on. Else it greys out.
let perDistrictSchools = {}, perDistrictReady = false, schoolListRaw = null;
const activeBands = new Set([6, 7, 8, 9, 10]);
function buildPerDistrict() {
  if (!scoresReady || !schoolListRaw) return;
  const nameToGeoid = {};
  for (const g in DISTRICTS) nameToGeoid[DISTRICTS[g].name] = g;
  perDistrictSchools = {};
  schoolListRaw.forEach(s => {
    if (s.score == null || s.score < 6) return;
    const g = nameToGeoid[s.district];
    if (g) (perDistrictSchools[g] = perDistrictSchools[g] || []).push({ level: s.level, score: s.score, k8: !!s.k8 });
  });
  perDistrictReady = true;
  if (entries.length) applyBands();
}
// Mirror the school-dot visibility test: a district is colored only if it holds a
// school that is currently visible (active score band AND active grade level).
function schoolVisible(level, score, k8) {
  if (!activeBands.has(score)) return false;
  if (k8) return sel.has("k8");                // combined K-8 schools gated by their own toggle
  const gated = level === "elementary" || level === "middle" || level === "high";
  return gated ? sel.has(level) : sel.size > 0;
}
function districtHasActiveSchool(geoid) {
  if (!perDistrictReady) return true;          // before schools load, show all
  const arr = perDistrictSchools[geoid];
  return arr ? arr.some(s => schoolVisible(s.level, s.score, s.k8)) : false;
}

// "Ideal" focus mode: show only the top-5 best-fit districts (and the schools +
// apartments inside them), hide everything else.
let idealOn = false, idealSet = new Set(), idealNames = new Set(), idealSaved = null;

function labelFor(geoid) {
  if (idealOn && !idealSet.has(geoid)) return L.divIcon({ className:"score-label", html:"", iconSize:[34,18] });
  const s = selScore(geoid);
  const show = s != null && districtHasActiveSchool(geoid);
  return L.divIcon({ className:"score-label", html: show ? fmt(s) : "", iconSize:[34,18] });
}

function styleFor(geoid) {
  if (idealOn && !idealSet.has(geoid)) return { opacity:0, fillOpacity:0, weight:0 };
  const s = DISTRICTS[geoid] ? selScore(geoid) : null;
  if (idealOn && idealSet.has(geoid)) {
    const cc = s == null ? "#94a3b8" : colorFor(s);
    return { color:"#92670b", weight:3, opacity:1, fillColor:cc, fillOpacity:0.62 };
  }
  if (s == null || !districtHasActiveSchool(geoid))
    return { color:"#d8d3c9", weight:0.5, opacity:0.6, fillColor:"#e7e3da", fillOpacity:0.12 };
  const c = colorFor(s);
  return { color:c, weight:1.5, opacity:0.9, fillColor:c, fillOpacity:0.5 };
}

function setIdeal(on) {
  if (on === idealOn) return;
  idealOn = on;
  const ctrl = document.querySelector(".leaflet-control-layers");
  if (on) {
    idealSaved = {
      basketball: map.hasLayer(basketballLayer),
      demo: demoMetric,
      center: map.getCenter(), zoom: map.getZoom()
    };
    map.removeLayer(basketballLayer);   // hide basketball (keep schools + apartments in the 5 districts)
    if (demoMetric) { document.getElementById("demoSelect").value = ""; setDemo(""); }
    if (ctrl) ctrl.style.display = "none";
    applyBands();                // hides the non-ideal districts
    applySchoolLevelFilter();    // keeps only school dots inside the 5 districts
    applyListingFilter();        // keeps only apartments inside the 5 districts
    const layers = entries.filter(e => idealSet.has(e.geoid)).map(e => e.layer);
    if (layers.length) map.fitBounds(L.featureGroup(layers).getBounds(), { padding:[50,50] });
  } else {
    if (idealSaved.basketball) basketballLayer.addTo(map);
    if (ctrl) ctrl.style.display = "";
    applyBands();
    applySchoolLevelFilter();
    applyListingFilter();
    if (idealSaved.demo) { document.getElementById("demoSelect").value = idealSaved.demo; setDemo(idealSaved.demo); }
    map.setView(idealSaved.center, idealSaved.zoom);
  }
}

function applyBands() {
  entries.forEach(({ geoid, layer, label }) => {
    layer.setStyle(styleFor(geoid));
    layer.setPopupContent(popupHtml(geoid));

}

// Multi-select toggle wiring — click to add/remove a grade band (1–3 at a time)

// Individual school locations (all 10 districts incl. Philadelphia), colored by a

const BAND_COLOR = { 10:"#15803d", 9:"#16a34a", 8:"#65a30d", 7:"#ca8a04", 6:"#d97706" };
const BANDS = [10, 9, 8, 7, 6];   // only show schools scoring 6–10; one toggle each
const SCHOOL_LABEL = { elementary:"Elementary", middle:"Middle / Intermediate", high:"High", other:"School" };
const bandLayers = {};
BANDS.forEach(b => bandLayers[b] = L.layerGroup());
// School attendance boundaries (NCES SABS 2015–16). Hover a school pin to isolate
// it: its catchment is drawn and every district fades away. ~90% of shown schools

fetch("school_boundaries.geojson").then(r => r.json()).then(g => {

});
let hlBoundary = null;
function clearSchoolBoundary() { if (hlBoundary) { map.removeLayer(hlBoundary); hlBoundary = null; } }

function dimDistricts(on) {

const schoolMarkers = []; // { m, level, score, district, k8 } — for grade-band & ideal show/hide
function applySchoolLevelFilter() {
  schoolMarkers.forEach(({ m, level, score, district, k8 }) => {
    let want;
    if (k8) want = sel.has("k8");                          // combined K-8 schools: their own toggle
    else {
      const gated = level === "elementary" || level === "middle" || level === "high";
      want = gated ? sel.has(level) : sel.size > 0;         // grade-center/intermediate: show if any band on
    }
    if (idealOn) want = want && idealNames.has(district);   // ideal: only schools in the 5 districts
    const grp = bandLayers[score];
    if (want && !grp.hasLayer(m)) grp.addLayer(m);
    else if (!want && grp.hasLayer(m)) grp.removeLayer(m);
  });
}
function applyListingFilter() {
  if (!listingItems) return;
  // Listings stay on the map (incl. Ideal mode), gated only by the source filter
  // (Both / Scout / Zillow).
  listingItems.forEach(({ s, marker }) => {
    const want = passesFilters(s);
    if (want && !listingsLayer.hasLayer(marker)) listingsLayer.addLayer(marker);
    else if (!want && listingsLayer.hasLayer(marker)) listingsLayer.removeLayer(marker);
  });
}

fetch("schools.json").then(r => r.json()).then(list => {
  schoolListRaw = list;

// Apartment listings (from the realtor's email) — geocoded, colored by budget,
// labeled which district they fall in. Loaded from listings.json.
const BUDGET_COLOR = { under:"#15803d", ceiling:"#d97706", over:"#b91c1c" };
// Link to the listing: the realtor's RealScout deep-link if present (s.url),
// else a reliable address search that lands on the public listing.
function listingUrl(s) {
  return s.url || ("https://www.google.com/search?q=" + encodeURIComponent(`${s.address}, ${s.city}, PA for rent`));
}
const listingsLayer = L.layerGroup();
function listingPopup(s) {
  const d = DISTRICTS[s.geoid];
  const sc = b => d && d[b] && d[b].score != null ? d[b].score : "–";
  const distLine = d
    ? `In <b>${s.district}</b> SD — Elem ${sc("elementary")} · Middle ${sc("middle")} · High ${sc("high")}`
    : `In ${s.district || "—"}`;
  const bathWarn = s.bathOK === false ? `<div class="pop-trend">⚠ only ${Math.floor(s.baths)} full bath (you want 2)</div>` : "";
  const col = s.added ? "#4f46e5" : (BUDGET_COLOR[s.budget] || "#334155");
  const img = s.photo ? `<img src="${s.photo}" alt="${s.address}" loading="lazy" style="width:100%;height:150px;object-fit:cover;border-radius:8px;display:block;margin-bottom:8px">` : "";
  const priceChip = s.price ? `${s.price}/mo` : "Added by you";
  const statsLine = (s.beds != null || s.baths != null || s.sqft != null)
    ? `${s.beds ?? "?"} bd · ${s.baths ?? "?"} ba · ${s.sqft != null ? s.sqft.toLocaleString() : "?"} sqft`
    : "Tap the link for full details, photos & price";
  return `${img}<h3 style="margin-bottom:2px">${s.address}</h3>
    <span class="pop-score" style="background:${col}">${priceChip}</span><span class="pop-band">${statsLine}</span>
    <div class="pop-meta">${s.city ? s.city + ", " : ""}PA${s.days != null ? ` · ${s.days} days on site` : ""}</div>
    ${s.approx ? `<div class="pop-trend">📍 Approximate — address not disclosed; pin placed at the ${s.zip} ZIP center</div>` : ""}
    <div class="pop-rank">${distLine}</div>${bathWarn}

}
let listingItems = null, scoresReady = false;
function maybeBuildSidebar() { if (scoresReady && listingItems) buildSidebar(listingItems); }

function highlightMarker(marker, on) {
  const pill = marker._icon && marker._icon.querySelector(".lst-pill");
  if (pill) pill.classList.toggle("lst-pill--hl", on);
  marker.setZIndexOffset(on ? 5000 : 2000);

let selectedGeoid = null;
function highlightDistrictCard(geoid) {
  selectedGeoid = geoid;
  document.querySelectorAll("#rightbar .dcard.selected").forEach(c => c.classList.remove("selected"));
  const card = document.querySelector(`#rightbar .dcard[data-geoid="${geoid}"]`);
  if (card) { card.classList.add("selected"); card.scrollIntoView({ block:"center", behavior:"smooth" }); }
}

function buildDistrictCards() {
  const wrap = document.getElementById("rightbar");
  if (!wrap || !scoresReady) return;
  const rows = [];
  for (const g in DISTRICTS) {
    const d = DISTRICTS[g];
    rows.push({ g, name: d.name, sc: selScore(g),
      e: d.elementary && d.elementary.score, m: d.middle && d.middle.score, h: d.high && d.high.score });
  }
  rows.sort((a, b) => (b.sc ?? -1) - (a.sc ?? -1));

  // Composite "fit" rank — priority: elementary+middle rating, then Black %, then closeness.
  const fit = rows.map(r => {
    const d = DISTRICTS[r.g];
    const em = (r.e != null && r.m != null) ? (r.e + r.m) / 2 : (r.e ?? r.m);
    return { g: r.g, em, black: d.demo ? d.demo.black : null, mi: d.mi };
  });
  const maxBlack = Math.max(1, ...fit.map(i => i.black ?? 0));
  const maxMi = Math.max(1, ...fit.map(i => i.mi ?? 0));
  fit.forEach(i => {
    const sN = (i.em ?? 0) / 10;
    const bN = (i.black ?? 0) / maxBlack;
    const dN = 1 - ((i.mi ?? maxMi) / maxMi);
    i.score = 0.70 * sN + 0.20 * bN + 0.10 * dN;   // schools weigh most, then Black %, then closeness
  });
  fit.sort((a, b) => b.score - a.score);
  const rankOf = new Map(fit.slice(0, 5).map((i, idx) => [i.g, idx + 1]));
  idealSet = new Set(rankOf.keys());
  idealNames = new Set([...idealSet].map(g => DISTRICTS[g].name));
  if (idealOn) { applyBands(); applySchoolLevelFilter(); applyListingFilter(); }

  wrap.innerHTML = `<div class="side-head">${rows.length} districts · ★ = best fit (schools · Black % · distance)</div>`;
  rows.forEach(r => {
    const col = r.sc == null ? "#94a3b8" : colorFor(r.sc);
    const dm = DISTRICTS[r.g].demo;
    const demoLine = dm
      ? `<div class="dcard-demo">W ${dm.white}% · <span class="bpct">B ${dm.black}%</span> · A ${dm.asian}% · H ${dm.hispanic}%</div>`
      : "";
    const rank = rankOf.get(r.g);
    const card = document.createElement("div");
    card.className = rank ? "dcard top" : "dcard";
    card.dataset.geoid = r.g;
    if (r.g === selectedGeoid) card.classList.add("selected");
    card.innerHTML =
      `<div class="dcard-score" style="background:${col}">${r.sc == null ? "–" : fmt(r.sc)}</div>
       <div class="dcard-body">
         <div class="dcard-name">${r.name}</div>
         <div class="dcard-emh">E ${r.e ?? "–"} · M ${r.m ?? "–"} · H ${r.h ?? "–"}</div>
         ${demoLine}
       </div>
       ${rank ? `<div class="dcard-rank">★ ${rank}</div>` : ""}`;
    const ent = entries.find(e => e.geoid === r.g);
    if (ent) {
      card.addEventListener("mouseenter", () => { ent.layer.setStyle({ weight:3, fillOpacity:0.72 }); card.classList.add("hl"); });
      card.addEventListener("mouseleave", () => { ent.layer.setStyle(styleFor(r.g)); card.classList.remove("hl"); });
      card.addEventListener("click", () => { map.fitBounds(ent.layer.getBounds(), { padding:[40,40], maxZoom:12 }); ent.layer.openPopup(); });
    }
    wrap.appendChild(card);
  });
}

// Per-listing notes + 1–3 rating, saved in the browser (localStorage) so they
// persist across reloads. Keyed by address+zip.
function noteKey(s) { return "mp:" + (s.address + "|" + s.zip).toLowerCase().replace(/[^a-z0-9]+/g, "_"); }
const getRate = k => +(localStorage.getItem(k + ":rate") || 0);
const setRate = (k, v) => { v ? localStorage.setItem(k + ":rate", v) : localStorage.removeItem(k + ":rate"); scheduleSync(); };
const getNote = k => localStorage.getItem(k + ":note") || "";
const setNote = (k, v) => { v ? localStorage.setItem(k + ":note", v) : localStorage.removeItem(k + ":note"); scheduleSync(); };

// Durable, cross-device storage: localStorage is the live store, but we also
// persist it to the server so notes/ratings survive a cache clear AND sync across
// devices. On the live HTTPS site that's notes.php (cybercanvas); on the local
// HTTP dev server it's serve.py's /api/notes. If neither is reachable this all
// no-ops and localStorage alone is used.
const NOTES_API = location.protocol === "https:" ? "notes.php" : "api/notes";
function allNotes() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith("mp:")) data[k] = localStorage.getItem(k);
  }
  return data;
}
let _syncTimer = null;
function scheduleSync() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => {
    fetch(NOTES_API, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(allNotes()) }).catch(() => {});
  }, 400);
}
// On load, pull the server notes into localStorage, then refresh the sidebar.
fetch(NOTES_API).then(r => r.ok ? r.json() : null).then(d => {
  if (!d) return;
  Object.entries(d).forEach(([k, v]) => { if (k.startsWith("mp:")) localStorage.setItem(k, v); });
  if (typeof restoreAddedListings === "function") restoreAddedListings();   // server-saved added listings
  if (listingItems) buildSidebar();
}).catch(() => {});

// ── Listings sidebar: an "Organize by" control + grouped/sorted cards ──
let sortMode = "county";
// Source filter: "both" | "scout" (RealScout email + scraped) | "zillow" (added by you).
let sourceFilter = "both";
function passesSource(s) {
  return sourceFilter === "both" ? true : sourceFilter === "zillow" ? !!s.added : !s.added;
}
// Seen filter: "all" | "seen" | "unseen". A listing counts as "seen" once it has a note.
let seenFilter = "all";
function hasNote(s) { return !!getNote(noteKey(s)).trim(); }
function passesSeen(s) {
  return seenFilter === "all" ? true : seenFilter === "seen" ? hasNote(s) : !hasNote(s);
}
function passesFilters(s) { return passesSource(s) && passesSeen(s); }

// County lookup by point-in-polygon (tracts carry county FIPS in GEOID[:5]).
const COUNTY_NAME = { "42011":"Berks", "42017":"Bucks", "42029":"Chester",
  "42045":"Delaware", "42091":"Montgomery", "42101":"Philadelphia" };
function pointInRing(x, y, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}
function pointInFeature(lng, lat, feat) {
  const g = feat.geometry; if (!g) return false;
  const polys = g.type === "Polygon" ? [g.coordinates] : g.type === "MultiPolygon" ? g.coordinates : [];
  for (const poly of polys) {
    if (poly[0] && pointInRing(lng, lat, poly[0])) {
      let hole = false;
      for (let h = 1; h < poly.length; h++) if (pointInRing(lng, lat, poly[h])) { hole = true; break; }
      if (!hole) return true;
    }
  }
  return false;
}
function assignCounties() {
  if (!tractGeo || !listingItems) return;
  listingItems.forEach(it => {
    if (it.county !== undefined) return;        // compute once per listing
    const f = tractGeo.features.find(ft => pointInFeature(it.s.lng, it.s.lat, ft));
    it.county = f ? f.properties.GEOID.slice(0, 5) : null;
    it.countyName = it.county ? (COUNTY_NAME[it.county] || "Other") : "Unknown";
  });
}

    : `<div class="lcard-price"><span class="added-tag">Added by you</span></div>`;
  const statsLine = (s.beds != null || s.baths != null || s.sqft != null)

    : "";
  card.innerHTML =
    `${s.photo ? `<img src="${s.photo}" loading="lazy" alt="">` : ""}
     <div class="lcard-body">
       ${s.favorite ? `<div class="fav-badge">♥ Saved on RealScout</div>` : ""}
       ${priceLine}

       <div class="lcard-dist">${s.district || "—"} · E${sc("elementary")} M${sc("middle")} H${sc("high")}${s.bathOK === false ? " · ⚠ 1 full bath" : ""}</div>
       <a class="lcard-link" href="${listingUrl(s)}" target="_blank" rel="noopener">${s.added ? "View on Zillow ↗" : "View details ↗"}</a>
       <div class="lcard-meta">
         <div class="lcard-rate"><span>Rate:</span><span class="star" data-r="1">★</span><span class="star" data-r="2">★</span><span class="star" data-r="3">★</span></div>
         <textarea class="lcard-note" placeholder="Notes…" rows="2"></textarea>
         ${s.added ? `<button class="lcard-remove" type="button">✕ Remove</button>` : ""}
       </div>`;
  card.addEventListener("mouseenter", () => { highlightMarker(marker, true); card.classList.add("hl"); });
  card.addEventListener("mouseleave", () => { highlightMarker(marker, false); card.classList.remove("hl"); });
  card.addEventListener("click", () => { map.panTo(marker.getLatLng()); marker.openPopup(); });
  card.querySelector(".lcard-link").addEventListener("click", ev => ev.stopPropagation());

  // rating stars
  const stars = card.querySelectorAll(".star");
  const paint = () => { const r = getRate(k); stars.forEach(st => st.classList.toggle("on", +st.dataset.r <= r)); };
  paint();
  stars.forEach(st => st.addEventListener("click", ev => {
    ev.stopPropagation();
    const v = +st.dataset.r;
    setRate(k, getRate(k) === v ? 0 : v);   // click the current rating again to clear
    paint();
    card.classList.toggle("rated", !!getRate(k));
  }));
  // notes box (stop clicks from panning the map; save on every edit)
  const note = card.querySelector(".lcard-note");
  note.value = getNote(k);
  note.addEventListener("input", () => {
    setNote(k, note.value);
    card.classList.toggle("lcard-seen", !!note.value.trim());   // grey live; re-filter only on next render
  });
  ["click", "mousedown", "dblclick"].forEach(e => note.addEventListener(e, ev => ev.stopPropagation()));
  // remove control (added listings only)
  const rm = card.querySelector(".lcard-remove");
  if (rm) rm.addEventListener("click", ev => { ev.stopPropagation(); removeAdded(s); });
  return card;
}

// Group + sort the listings for the current "Organize by" mode.
function listingGroups(items) {
  const byPrice = (a, b) => a.s.priceNum - b.s.priceNum;
  if (sortMode === "recent") {
    // Newest first by when it entered our data (firstSeen, ISO date sorts lexically).
    const byRecent = (a, b) => (b.s.firstSeen || "").localeCompare(a.s.firstSeen || "") || byPrice(a, b);
    return [{ label: "", items: items.slice().sort(byRecent) }];
  }
  if (sortMode === "rating") {
    const buckets = [3, 2, 1, 0].map(r => ({ label: r ? "★".repeat(r) : "Unrated", items: [] }));
    items.forEach(it => buckets[3 - getRate(noteKey(it.s))].items.push(it));
    return buckets.filter(g => g.items.length)
      .map(g => ({ label: `${g.label} · ${g.items.length}`, items: g.items.sort(byPrice) }));
  }
  if (sortMode === "county") {
    assignCounties();
    const byTownPrice = (a, b) => a.s.city.localeCompare(b.s.city) || a.s.priceNum - b.s.priceNum;
    const byCounty = {};
    items.forEach(it => { const n = it.countyName || "Unknown"; (byCounty[n] = byCounty[n] || []).push(it); });
    return Object.keys(byCounty).sort()
      .map(n => ({ label: `${n}${n === "Philadelphia" ? "" : " County"} · ${byCounty[n].length}`, items: byCounty[n].sort(byTownPrice) }));
  }
  return [{ label: "", items: items.slice().sort(byPrice) }];
}

function renderListings() {
  const list = document.getElementById("listingList");
  if (!list || !listingItems) return;
  list.innerHTML = "";
  listingGroups(listingItems.filter(it => passesFilters(it.s))).forEach(g => {
    if (g.label) {
      const h = document.createElement("div");
      h.className = "group-head";
      h.textContent = g.label;
      list.appendChild(h);
    }
    g.items.forEach(({ s, marker }) => list.appendChild(makeCard(s, marker)));
  });
}

// ── Add-your-own listings: paste a Zillow link (or address) → pin + card + link ──
// Saved in localStorage (key mp:added) and synced to disk like notes, so they
// persist across reloads and show on your phone. We geocode with Nominatim and
// tag district/county/scores by point-in-polygon — we do NOT scrape Zillow, so
// price/photos aren't pulled; the card links straight to the listing instead.
const ADDED_KEY = "mp:added";
function loadAdded() {
  try { const a = JSON.parse(localStorage.getItem(ADDED_KEY) || "[]"); return Array.isArray(a) ? a : []; }
  catch { return []; }
}
function saveAdded(arr) { localStorage.setItem(ADDED_KEY, JSON.stringify(arr)); scheduleSync(); }

function findDistrictGeoid(lng, lat) {
  if (!districtGeo) return null;
  const f = districtGeo.features.find(ft => DISTRICTS[ft.properties.GEOID] && pointInFeature(lng, lat, ft));
  return f ? f.properties.GEOID : null;
}
function findCounty(lng, lat) {
  if (!tractGeo) return { fips: null, name: "Unknown" };
  const f = tractGeo.features.find(ft => pointInFeature(lng, lat, ft));
  const fips = f ? f.properties.GEOID.slice(0, 5) : null;
  return { fips, name: fips ? (COUNTY_NAME[fips] || "Other") : "Unknown" };
}
async function nominatim(q) {
  const params = new URLSearchParams({
    q, format: "json", addressdetails: "1", limit: "1", countrycodes: "us",
    viewbox: "-75.85,40.65,-74.85,39.80", bounded: "0",
  });
  const r = await fetch("https://nominatim.openstreetmap.org/search?" + params, { headers: { Accept: "application/json" } });
  const j = await r.json();
  return j && j.length ? j[0] : null;
}
// Try the full address, then progressively coarser fallbacks (street+town, ZIP,
// town) so a house the free geocoder doesn't know still lands a pin in the right
// area. Returns { hit, approx } — approx=true means we fell back below the exact
// address. The displayed street address always comes from the user's input.
async function geocodeOne(text) {
  const hasState = /\b(pa|pennsylvania)\b/i.test(text);
  const zip = (text.match(/\b(\d{5})\b/) || [])[1];
  const noZip = text.replace(/\b\d{5}\b/, "").replace(/\s{2,}/g, " ").trim();
  const tries = [hasState ? text : text + ", PA", noZip + (hasState ? "" : ", PA")];
  if (zip) tries.push(zip + ", PA");          // ZIP centroid — reliable last resort
  for (let i = 0; i < tries.length; i++) {
    if (!tries[i] || !tries[i].replace(/[, ]/g, "")) continue;
    try {
      const hit = await nominatim(tries[i]);
      if (hit) return { hit, approx: i >= 2 };   // i>=2 means ZIP/town centroid
    } catch {}
  }
  return null;
}

function addListingItem(s, persist) {
  const item = { s, marker: listingMarker(s),
    county: s.county ?? null,
    countyName: s.countyName || (s.county ? (COUNTY_NAME[s.county] || "Other") : "Unknown") };
  listingItems.push(item);
  if (persist) { const arr = loadAdded(); arr.push(s); saveAdded(arr); }
  if (!passesFilters(s) && listingsLayer.hasLayer(item.marker)) listingsLayer.removeLayer(item.marker);
  renderListings();
  return item;
}
function restoreAddedListings() {
  if (!Array.isArray(listingItems)) return;
  const have = new Set(listingItems.map(it => noteKey(it.s)));
  loadAdded().forEach(s => {
    if (have.has(noteKey(s))) return;
    have.add(noteKey(s));
    addListingItem(s, false);
  });
}
function removeAdded(s) {
  const key = noteKey(s);
  const idx = listingItems.findIndex(it => noteKey(it.s) === key);
  if (idx >= 0) { listingsLayer.removeLayer(listingItems[idx].marker); listingItems.splice(idx, 1); }
  saveAdded(loadAdded().filter(x => noteKey(x) !== key));
  renderListings();
}

function setAddStatus(msg, isErr) {
  const el = document.getElementById("addStatus");
  if (!el) return;
  el.textContent = msg;
  el.classList.toggle("err", !!isErr);
  el.hidden = !msg;
}
// Keep the address the user actually pasted (or the one in the Zillow URL slug);
// the geocoder is only for the map pin and to help split city/zip. This avoids
// losing the house number when the geocoder only resolves to a road/town.
function parseAddrText(text, a) {
  text = (text || "").replace(/\s+/g, " ").trim();
  const zipM = text.match(/\b(\d{5})\b/);
  const zip = (a && a.postcode) || (zipM ? zipM[1] : "");
  const cityHint = (a && (a.city || a.town || a.township || a.village || a.hamlet || a.municipality)) || "";
  let street, city = cityHint;
  if (text.includes(",")) {                                  // "123 Main St, Lansdale, PA 19446"
    const parts = text.split(",").map(s => s.trim()).filter(Boolean);
    street = parts[0];
    if (!city && parts[1]) city = parts[1].replace(/\b[A-Z]{2}\b.*$/, "").replace(/\b\d{5}\b.*$/, "").trim();
  } else {                                                   // slug form: "123 Main St Lansdale PA 19446"
    let t = text;
    if (zip) t = t.replace(new RegExp("\\s*" + zip + "\\s*$"), "");
    t = t.replace(/\s+(PA|Pennsylvania)\s*$/i, "").trim();
    // Only peel the geocoder's town off the end if it actually appears in the
    // pasted address; otherwise (e.g. it returned a township for a ZIP centroid)
    // keep the full street line and drop the mismatched town.
    const re = cityHint && new RegExp("\\s" + cityHint.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\s*$", "i");
    if (re && re.test(" " + t)) t = t.replace(re, "").trim();
    else city = "";
    street = t;
  }
  if (!street) street = (a && [a.house_number, a.road].filter(Boolean).join(" ")) || text;
  return { street, city, zip };
}

async function addFromInput() {
  const inp = document.getElementById("addInput");
  const btn = document.getElementById("addBtn");
  const raw = (inp.value || "").trim();
  if (!raw) return;
  const isUrl = /^https?:\/\//i.test(raw);
  let url = isUrl ? raw : "";
  let query = raw;
  const zslug = raw.match(/zillow\.com\/homedetails\/([^/]+)/i);
  if (zslug) query = decodeURIComponent(zslug[1]).replace(/-/g, " ");
  else if (isUrl) query = raw.replace(/^https?:\/\/[^/]+\//, "").replace(/[-/_]+/g, " ").replace(/\?.*$/, "");

  btn.disabled = true; inp.disabled = true;
  setAddStatus("Looking up address…", false);
  try {
    const geo = await geocodeOne(query);
    if (!geo) { setAddStatus("Couldn't find that address. Try pasting the full street address (with town).", true); return; }
    const a = geo.hit.address || {};
    const lat = +geo.hit.lat, lng = +geo.hit.lon;
    const parsed = parseAddrText(query, a);   // keep the pasted/slug address, not the geocoder's
    const street = parsed.street, city = parsed.city, zip = parsed.zip;
    const geoid = findDistrictGeoid(lng, lat);
    const cc = findCounty(lng, lat);
    const s = {
      address: street, city, zip, lat, lng,
      url: url || ("https://www.zillow.com/homes/" + encodeURIComponent(query) + "_rb/"),
      district: geoid && DISTRICTS[geoid] ? DISTRICTS[geoid].name : "—",
      geoid: geoid || null, county: cc.fips, countyName: cc.name,
      added: true, budget: "added", approx: geo.approx || undefined,
      beds: null, baths: null, sqft: null, price: null, priceNum: 0
    };
    if (listingItems.some(it => noteKey(it.s) === noteKey(s))) {
      setAddStatus("That listing is already on the map.", false);
      inp.value = "";
      return;
    }
    addListingItem(s, true);
    inp.value = "";
    setAddStatus(`Added ✓ ${street}${city ? ", " + city : ""} — ${s.district}${geo.approx ? " (approx pin)" : ""}`, false);
    const it = listingItems.find(i => noteKey(i.s) === noteKey(s));
    if (it) { map.setView([lat, lng], Math.max(map.getZoom(), 13)); it.marker.openPopup(); }
    setTimeout(() => setAddStatus("", false), 6000);
  } catch (e) {
    setAddStatus("Lookup failed: " + e.message, true);
  } finally {
    btn.disabled = false; inp.disabled = false;
  }
}

// ── Demographic overlay (race/ethnicity by Census tract, ACS via CDC SVI 2022) ──
let tractGeo = null, tractLayer = null, demoMetric = "", demoLegendCtrl = null;
const DEMO_LABEL = { white:"% White", black:"% Black", asian:"% Asian", hispanic:"% Hispanic", crime:"Violent crime rate" };
const DEMO_BREAKS = [[75,"#4a1486"],[50,"#6a51a3"],[30,"#807dba"],[15,"#9e9ac8"],[5,"#cbc9e2"],[0,"#f2f0f7"]];
function rampColor(p) {
  if (p == null) return "#e9e9e9";
  for (const [thr, col] of DEMO_BREAKS) if (p >= thr) return col;
  return "#f2f0f7";
}

// Violent crime, FBI-derived rate per 1,000 residents (CrimeGrade.org, 2025), keyed
// by county FIPS. Crime is reported by county, so every tract in a county shares its
// rate — the overlay effectively shades the map by county.
const CRIME_BY_FIPS = {
  "42029": { county:"Chester",      rate:1.533, grade:"A+" },
  "42017": { county:"Bucks",        rate:1.719, grade:"A+" },
  "42091": { county:"Montgomery",   rate:1.868, grade:"A+" },
  "42011": { county:"Berks",        rate:2.313, grade:"A"  },
  "42045": { county:"Delaware",     rate:2.815, grade:"B+" },
  "42101": { county:"Philadelphia", rate:4.124, grade:"C"  },
};
const CRIME_BREAKS = [[3.5,"#d73027"],[2.5,"#fc8d59"],[1.8,"#fee08b"],[0,"#1a9850"]];
function crimeColor(fips) {
  const c = CRIME_BY_FIPS[fips];
  if (!c) return "#e9e9e9";
  for (const [thr, col] of CRIME_BREAKS) if (c.rate >= thr) return col;
  return "#1a9850";
}
function demoRow(k, pr) {
  const lbl = { white:"White", black:"Black", asian:"Asian", hispanic:"Hispanic" }[k];
  const v = pr[k];
  return `<div${k === demoMetric ? ' style="font-weight:700"' : ""}>${lbl}: ${v == null ? "—" : v + "%"}</div>`;
}
function updateDemoLegend() {
  if (demoLegendCtrl) { map.removeControl(demoLegendCtrl); demoLegendCtrl = null; }
  if (!demoMetric) return;
  demoLegendCtrl = L.control({ position:"topright" });
  demoLegendCtrl.onAdd = () => {
    const d = L.DomUtil.create("div", "legend");
    if (demoMetric === "crime") {
      d.innerHTML = `<h4>${DEMO_LABEL.crime} · by county</h4>` +
        [["3.5+ /1k","#d73027"],["2.5–3.5","#fc8d59"],["1.8–2.5","#fee08b"],["under 1.8","#1a9850"]]
          .map(([t,c]) => `<div class="row"><span class="swatch" style="background:${c}"></span> ${t}</div>`).join("") +
        `<div class="note">Violent crimes per 1,000 residents/yr, by county (FBI-derived, CrimeGrade 2025). Whole-county figure — not block-level.</div>`;
    } else {
      d.innerHTML = `<h4>${DEMO_LABEL[demoMetric]} · by tract</h4>` +
        [["75–100%","#4a1486"],["50–75%","#6a51a3"],["30–50%","#807dba"],["15–30%","#9e9ac8"],["5–15%","#cbc9e2"],["0–5%","#f2f0f7"]]
          .map(([t,c]) => `<div class="row"><span class="swatch" style="background:${c}"></span> ${t}</div>`).join("") +
        `<div class="note">ACS 2018–22 (CDC SVI). Census tracts, not districts. "White" = non-Hispanic.</div>`;
    }
    return d;
  };
  demoLegendCtrl.addTo(map);
}
fetch("tracts.geojson").then(r => r.json()).then(g => {
  tractGeo = g;
  if (demoMetric) setDemo(demoMetric);

function setDemo(metric) {
  demoMetric = metric;

  entries.forEach(({ label }) => label.setOpacity(metric ? 0 : 1));   // hide district numbers under the overlay
  updateDemoLegend();

           <div class="pop-meta" style="font-style:italic">County-level (FBI-derived, CrimeGrade 2025)</div>`,

// ── Town / address search (keyless, Nominatim; biased to the Lansdale–Philly area) ──
const searchLayer = L.layerGroup().addTo(map);
async function runSearch(q) {
  q = q.trim();
  if (!q) return;
  const input = document.getElementById("searchInput");
  const hasState = /\b(pa|pennsylvania)\b/i.test(q);
  const params = new URLSearchParams({
    q: hasState ? q : q + ", PA",
    format: "json", limit: "1", countrycodes: "us",
    viewbox: "-75.85,40.65,-74.85,39.80", bounded: "0",
  });
  input.disabled = true;
  try {
    const r = await fetch("https://nominatim.openstreetmap.org/search?" + params, { headers: { Accept: "application/json" } });
    const j = await r.json();
    if (!j.length) { alert(`No match for "${q}"`); return; }
    const hit = j[0], lat = +hit.lat, lng = +hit.lon;
    searchLayer.clearLayers();
    L.marker([lat, lng]).addTo(searchLayer)
      .bindPopup(`<h3 style="margin-bottom:2px">${hit.display_name.split(",")[0]}</h3><div class="pop-meta">${hit.display_name}</div>`)
      .openPopup();
    map.flyTo([lat, lng], 14);
  } catch (e) {
    alert("Search failed: " + e.message);
  } finally {
    input.disabled = false;
  }
}
document.getElementById("searchCtrl").addEventListener("submit", e => {
  e.preventDefault();
  runSearch(document.getElementById("searchInput").value);
});

// ── Collapse / expand the left (listings) and right (districts) columns ──
const mainEl = document.getElementById("main");
function toggleColumn(cls, btn, glyphOpen, glyphClosed) {
  const collapsed = mainEl.classList.toggle(cls);
  btn.textContent = collapsed ? glyphClosed : glyphOpen;
  setTimeout(() => map.invalidateSize(), 200);   // let the width transition finish, then refit tiles
}
document.getElementById("toggleLeft").addEventListener("click", function () {
  toggleColumn("l-collapsed", this, "◀", "▶");
});
document.getElementById("toggleRight").addEventListener("click", function () {
  toggleColumn("r-collapsed", this, "▶", "◀");
});

// Dev auto-reload: polls the source files over plain HTTP and reloads the tab on
// any change. Uses HTTP (not a WebSocket) so it works across the WSL → Windows
// browser boundary. Active on any non-HTTPS host (localhost OR a LAN/WSL IP), so
// it works however you open the page; inert on a real HTTPS deployment.
(function () {
  if (location.protocol === "https:") return;
  const files = ["index.html", "schools.json", "districts.geojson", "districts_scores.json", "listings.json", "school_boundaries.geojson", "tracts.geojson"];
  const stamps = {};
  let primed = false, beat = 0;
  // Visible heartbeat so you can SEE it polling (and confirm it's alive).
  const badge = document.createElement("div");
  badge.style.cssText = "position:fixed;left:8px;bottom:8px;z-index:9999;font:11px/1 Inter,sans-serif;" +
    "background:#111;color:#7CFC9A;padding:4px 8px;border-radius:6px;opacity:.85;box-shadow:0 1px 4px rgba(0,0,0,.4)";
  badge.textContent = "● live-reload on";
  document.body.appendChild(badge);
  async function check() {
    let changed = false, ok = false;
    for (const f of files) {
      try {
        const r = await fetch(f + "?_=" + Date.now(), { method: "HEAD", cache: "no-store" });
        ok = true;
        const tag = r.headers.get("last-modified") || r.headers.get("etag") || r.headers.get("content-length");
        if (primed && stamps[f] !== tag) changed = true;
        stamps[f] = tag;
      } catch (e) { /* server momentarily down (e.g. restart) — ignore */ }
    }
    if (ok) { beat++; badge.textContent = "● live-reload on " + (beat % 2 ? "·" : ":"); }
    if (!primed) { primed = true; return; }
    if (changed) { badge.textContent = "↻ reloading…"; location.reload(); }
  }
  setInterval(check, 1000);
  check();
})();
</script>
